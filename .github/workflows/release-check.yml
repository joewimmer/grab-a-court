name: Release Check

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Seed database
        run: make db-seed

      - name: Production build
        run: make build

      - name: Release readiness summary
        run: |
          echo "## Release Readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies installed" >> $GITHUB_STEP_SUMMARY
          echo "- Database seeded successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Backend and frontend built for production" >> $GITHUB_STEP_SUMMARY
          echo "- Push a \`v*\` tag to publish a GitHub Release asset" >> $GITHUB_STEP_SUMMARY
